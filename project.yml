name: 做饭记
options:
  bundleIdPrefix: com.lufi000
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

targets:
  做饭记:
    type: application
    platform: iOS
    sources:
      - path: 做饭记
        excludes:
          - "**/*.plist"
    info:
      path: 做饭记/Info.plist
      properties:
        CFBundleDisplayName: "What's Cooking"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "需要访问相机以拍摄菜品照片；可选用于识别菜谱信息。"
        NSPhotoLibraryUsageDescription: "需要访问相册以选择菜品照片；可选用于识别菜谱信息。"
        ITSAppUsesNonExemptEncryption: false
        UIUserInterfaceStyle: Light
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.lufi000.zuofanji"
        DEVELOPMENT_TEAM: "3488U99HV8"
        CODE_SIGN_STYLE: "Automatic"
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
